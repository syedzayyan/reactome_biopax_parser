name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install core dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest

      - name: Run fast tests (no network)
        run: pytest tests/ -v

  test-network:
    name: Network tests (download + parse)
    runs-on: ubuntu-latest
    # Only run on pushes to main, not on every PR, to avoid hammering Reactome.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install core dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest

      - name: Run network tests (download + parse)
        run: pytest tests/ -v --run-network -k "TestDownload"
        timeout-minutes: 10
